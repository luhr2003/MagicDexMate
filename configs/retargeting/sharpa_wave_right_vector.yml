retargeting:
  type: vector
  urdf_path: sharpa_wave/right/right_sharpa_wave.urdf

  # Target = robot hand: 5 vectors from the palm root to each fingertip IK frame.
  target_origin_link_names: [ "right_hand_C_MC", "right_hand_C_MC", "right_hand_C_MC", "right_hand_C_MC", "right_hand_C_MC" ]
  target_task_link_names: [ "right_thumb_fingertip", "right_index_fingertip", "right_middle_fingertip", "right_ring_fingertip", "right_pinky_fingertip" ]

  # Source = human hand, MediaPipe indices: wrist->thumb/index/middle/ring/pinky tips.
  target_link_human_indices: [ [ 0, 0, 0, 0, 0 ], [ 4, 8, 12, 16, 20 ] ]

  # robot hand size / human hand size; tune per operator (scripts/check_env.py prints
  # the robot wrist->middle-fingertip length to recompute this).
  scaling_factor: 1.07

  # Smaller alpha = smoother but more latency.
  low_pass_alpha: 0.2
